#version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: radar36_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # - REQUIREMENTS_FILE=requirements/prod.txt  # Uncomment in production to install S3 & cloud DB dependencies
        - REQUIREMENTS_FILE=requirements/dev.txt  # Use dev.txt for local dev with debug toolbar
    command: sh -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    labels:
      - "traefik.enable=true"
      # HTTP Router (Port 80)
      - "traefik.http.routers.backend-http.rule=PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`) || PathPrefix(`/media`) || PathPrefix(`/ws`) || PathPrefix(`/r`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.service=backend"
      # HTTPS Router (Port 443)
      - "traefik.http.routers.backend-https.rule=PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`) || PathPrefix(`/media`) || PathPrefix(`/ws`) || PathPrefix(`/r`)"
      - "traefik.http.routers.backend-https.entrypoints=websecure"
      - "traefik.http.routers.backend-https.tls=true"
      - "traefik.http.routers.backend-https.service=backend"
      # Load Balancer Port
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db    # Bypassed if DATABASE_URL is set in backend/.env
      - redis

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - REQUIREMENTS_FILE=requirements/dev.txt  # Use dev.txt for local dev with debug toolbar
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db    # Bypassed if DATABASE_URL is set in backend/.env
      - redis

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - REQUIREMENTS_FILE=requirements/dev.txt  # Use dev.txt for local dev with debug toolbar
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=${DB_HOST:-db}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db    # Bypassed if DATABASE_URL is set in backend/.env
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      # HTTP Router (Port 80)
      - "traefik.http.routers.frontend-http.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.service=frontend"
      # HTTPS Router (Port 443)
      - "traefik.http.routers.frontend-https.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend-https.entrypoints=websecure"
      - "traefik.http.routers.frontend-https.tls=true"
      - "traefik.http.routers.frontend-https.service=frontend"
      # Load Balancer Port
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  local-whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    env_file:
      - ./backend/.env
    environment:
      - WHISPER_MODEL_DIR=/app/models
      - OMP_NUM_THREADS=2
      - OPENBLAS_NUM_THREADS=2
      - MKL_NUM_THREADS=2
    ports:
      - "9000:8000"
    volumes:
      - whisper_models:/app/models

  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  whisper_models:

